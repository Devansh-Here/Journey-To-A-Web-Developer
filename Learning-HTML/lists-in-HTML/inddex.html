<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists in HTML</title>
</head>
<body>
    <h2>Unordered Lists</h2>
    <ul type="square">
        <li>Rohan</li>
        <li>Mohan</li>
        <li>Sohan</li>
    </ul>

    <h2>Ordered List</h2>
    <ol>
        <li>Rohan</li>
        <li>Mohan</li>
        <li>Sohan</li>
    </ol>    

    <h2>Defination Lists</h2>
    <dl>
        <dt>HTML</dt>
        <dd>
            HyperText Markup Language a standard Language used for creating webpages.
        </dd>

        <dt>CSS</dt>
        <dd>
            Used to style webpages.
        </dd>

        <dt>JavaScript</dt>
        <dd>
            A programmimg language used to add intractive features in webpage.
        </dd>
    </dl>
    
</body>
</html>
