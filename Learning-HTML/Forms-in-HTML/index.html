<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms in HTML</title>
</head>
<body>
    <h2>Application form for participating in Music Compitition</h2>

    <form action="post">

        <div>
            <label for="Name">Enter Your Name : </label>
            <input type="text" required id="username" name="'username" placeholder="Enter Your Name">
        </div>

        <div>
            <label for="class">Enter in which class you study : </label>
            <input type="text" name="class" id="class">
        </div>

        <div>
            <label for="section">Select Your Section : </label>
            <select name="section"  id="section">
                <option value="">Select</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
                <option value="E">E</option>
            </select>
        </div>

        <div>
        <label for="instuments">Which Instruments you know to play??</label>
        </div>

        <input type="checkbox" id="Harmonium" name="harmonium" value="yes">
        <label for="harmonium">Harmonium</label>

        <input type="checkbox" id="piano" name="piano" value="yes">
        <label for="piano">Piano</label>

        <input type="checkbox" id="snare-drum" name="snare-drum" value="yes">
        <label for="snare-drum">Snare Drum</label>

        <input type="checkbox" id="Drum" name="Drum" value="yes">
        <label for="Drum">Drum</label>

        <input type="checkbox" id="Cymbal" name="Cymbal" value="yes">
        <label for="Cymbal">Cymbal</label>

        <input type="checkbox" id="Nothing" name="Nothing" value="yes">
        <label for="Nothing">Nothing</label>
        

        <div>
        <label for="selection">What do you want to do??</label>
        <br>

        <input type="radio" id="'sing" name="sing" value="singer">
        <label for="sing">Singing</label>

        <input type="radio" id="Play" name="Play" value="player">
        <label for="Play">Instrument</label>

        <input type="radio" id="both" name="both" value="both">
        <label for="both">Both</label>
        </div>

        <input type="submit">

    </form>
</body>
</html>
